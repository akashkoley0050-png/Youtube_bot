name: Daily Harry Potter Short

on:
  schedule:
    # 07:00 UTC = 12:30 IST (afternoon)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional — overrides rotation if set"
        required: false
        default: ""

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
  YT_CLIENT_SECRET_VALUE: ${{ secrets.YT_CLIENT_SECRET_VALUE }}
  YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore history + Harry Potter rotation state
        uses: actions/cache/restore@v4
        with:
          path: output/history/
          key: potter-history-${{ github.run_id }}
          restore-keys: |
            potter-history-

      - name: Generate & upload Short
        run: |
          TOPIC="${{ github.event.inputs.topic || '' }}"
          if [ -n "$TOPIC" ]; then
            python scripts/run_short.py --channel harry_potter --topic "$TOPIC" --upload --privacy public
          else
            python scripts/run_short.py --channel harry_potter --upload --privacy public
          fi

      - name: Save history + Harry Potter rotation state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: output/history/
          key: potter-history-${{ github.run_id }}
